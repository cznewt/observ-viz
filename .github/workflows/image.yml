name: image

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'libs/**'
      - 'custom/**'
      - 'gen/**'
      - 'config/**'
      - 'scripts/**'
      - 'reference/**'
      - 'scenarios/**'
      - 'patterns/**'
      - 'g.libsonnet'
      - 'main.libsonnet'
      - 'VERSION'
      - '.github/workflows/image.yml'
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: read version
        id: v
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/cznewt/observ-lib:latest
            ghcr.io/cznewt/observ-lib:${{ steps.v.outputs.version }}

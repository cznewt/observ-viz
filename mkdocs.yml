site_name: observ-viz
site_description: >-
  A standalone Jsonnet library for generating Grafana dashboard schema v2
  resources — slim core, lots of mixins.

theme:
  name: material
  palette:
    scheme: slate
    primary: deep orange
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Concepts: concepts.md
  - Core API: api.md
  - Packs (mixins): packs.md
  - observ-libs: libs.md
  - Chart types: panels.md
  - Reference & scenarios: reference.md
  - Backstage: backstage.md
  - Examples & local Grafana: examples.md
  - Docker image: docker.md

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables

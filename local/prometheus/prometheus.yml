global:
  scrape_interval: 15s
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']
  # grafana exposes Go runtime metrics at /metrics — feeds the golang pack
  - job_name: grafana
    static_configs:
      - targets: ['grafana:3000']

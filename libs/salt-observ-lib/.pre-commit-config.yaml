---
minimum_pre_commit_version: 2.20.0
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: check-merge-conflict  # Check for files that contain merge conflict strings.
      - id: trailing-whitespace   # Trims trailing whitespace.
        args: [--markdown-linebreak-ext=md]
      - id: mixed-line-ending     # Replaces or checks mixed line ending.
        args: [--fix=lf]
      - id: end-of-file-fixer     # Makes sure files end in a newline and only a newline.
      - id: check-merge-conflict  # Check for files that contain merge conflict strings.
      - id: check-ast             # Simply check whether files parse as valid python.

  # ----- Formatting ---------------------------------------------------------------------------->
  - repo: https://github.com/saltstack/pre-commit-remove-import-headers
    rev: 1.1.0
    hooks:
      - id: remove-import-headers

  - repo: local
    hooks:
      - id: check-docs
        name: Check rST doc files exist for engines
        entry: python .pre-commit-hooks/make-autodocs.py
        language: system
        pass_filenames: false

  - repo: https://github.com/s0undt3ch/salt-rewrite
    # Automatically rewrite code with known rules
    rev: 2.0.0
    hooks:
      - id: salt-rewrite
        alias: rewrite-docstrings
        name: Salt extensions docstrings auto-fixes
        files: ^vector-engine/src/saltext/vector/.*\.py$
        args: [--silent]

  - repo: https://github.com/s0undt3ch/salt-rewrite
    # Automatically rewrite code with known rules
    rev: 2.0.0
    hooks:
      - id: salt-rewrite
        alias: rewrite-tests
        name: Rewrite the test suite
        files: ^vector-engine/tests/.*\.py$
        args: [--silent, -E, fix_docstrings]

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.1.0
    hooks:
      - id: pyupgrade
        name: Rewrite Code to be Py3.6+
        args: [
          --py36-plus
        ]
        exclude: vector-engine/src/saltext/version.py

  - repo: https://github.com/asottile/reorder_python_imports
    rev: v3.9.0
    hooks:
      - id: reorder-python-imports
        args: [
          --py3-plus,
        ]
        exclude: vector-engine/src/saltext/version.py

  - repo: https://github.com/psf/black
    rev: 22.10.0
    hooks:
      - id: black
        args: [-l 100]
        exclude: vector-engine/src/saltext/version.py

  - repo: https://github.com/asottile/blacken-docs
    rev: v1.12.1
    hooks:
      - id: blacken-docs
        args: [--skip-errors]
        files: ^(docs/.*\.rst|tempo-relay/src/.*\.py|vector-engine/src/saltext/vector/.*\.py)$
        additional_dependencies: [black==22.10.0]

  - repo: https://github.com/rstcheck/rstcheck
    rev: v6.1.0
    hooks:
      - id: rstcheck
        name: Check reST files using rstcheck
        args:
          - --report-level=warning
          - --ignore-directives=automodule,autosummary,toctree
          - --ignore-roles=ref
  # <---- Formatting -----------------------------------------------------------------------------

  # ----- Security ------------------------------------------------------------------------------>
  - repo: https://github.com/PyCQA/bandit
    rev: "1.7.4"
    hooks:
      - id: bandit
        alias: bandit-salt
        name: Run bandit against the code base
        args: [--silent, -lll, --skip, B701]
        exclude: vector-engine/src/saltext/version.py
        additional_dependencies: ['importlib_metadata<5']
  - repo: https://github.com/PyCQA/bandit
    rev: "1.7.4"
    hooks:
      - id: bandit
        alias: bandit-tests
        name: Run bandit against the test suite
        args: [--silent, -lll, --skip, B701]
        files: ^(vector-engine/tests/.*|tempo-relay/tests/.*)
        additional_dependencies: ['importlib_metadata<5']
  # <---- Security -------------------------------------------------------------------------------

  # ----- Code Analysis ------------------------------------------------------------------------->
  - repo: https://github.com/saltstack/mirrors-nox
    rev: v2022.8.7
    hooks:
      - id: nox
        alias: lint-src
        name: Lint Source Code
        files: ^(vector-engine/src/saltext/.*\.py|tempo-relay/src/.*\.py)$
        args:
          - -e
          - lint-code-pre-commit
          - --

  # - repo: https://github.com/saltstack/mirrors-nox
  #   rev: v2022.8.7
  #   hooks:
  #     - id: nox
  #       alias: lint-tests
  #       name: Lint Tests
  #       files: ^(vector-engine/tests/.*\.py|tempo-relay/tests/.*\.py $
  #       args:
  #         - -e
  #         - lint-tests-pre-commit
  #         - --
  # <---- Code Analysis --------------------------------------------------------------------------

  # ----- Static Requirements ------------------------------------------------------------------->
  - repo: https://github.com/peterdemin/pip-compile-multi
    rev: v2.4.6
    hooks:
      - id: pip-compile-multi-verify
  # <---- Static Requirements --------------------------------------------------------------------
